name: code-quality-env
version: 0.1.0
description: RL environment where an AI agent learns to review and fix buggy Python code
author: Neurobytes
tasks:
  - name: easy
    description: Fix syntax errors in Python code
  - name: medium
    description: Fix logic bugs in Python code
  - name: hard
    description: Optimize slow Python code
observation_space: buggy Python code snippet with error hint
action_space: identify_bug or suggest_fix
reward_range: [0.0, 1.0]